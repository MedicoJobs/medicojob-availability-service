apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: prod
  name: availability-service
  labels:
    app: availability-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: availability-service
  template:
    metadata:
      labels:
        app: availability-service
    spec:
      automountServiceAccountToken: false
      containers:
      - name: availability-service
        image: pavithrasambath2003/availability-service:v1
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
            ephemeral-storage: 512Mi
          limits:
            memory: 512Mi
            ephemeral-storage: 1Gi
        readinessProbe:
          tcpSocket:
            port: 5004
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5004
          initialDelaySeconds: 15
          periodSeconds: 20
        ports:
        - containerPort: 5004
        env:
        - name: PORT
          value: "5004"
        envFrom:
        - configMapRef:
            name: medicojob-config
        - secretRef:
            name: medicojob-secrets



