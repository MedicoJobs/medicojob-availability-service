name: availability-service CI Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pipeline:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged != true }}
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: availability-service
      service_path: .
      sonar_project_key: medicojob-availability-service
      sonar_token_secret_name: SONAR_TOKEN
    secrets: inherit
