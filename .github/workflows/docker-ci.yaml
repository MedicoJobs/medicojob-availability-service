name: availability-service Docker Image Pipeline

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
      - labeled
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  actions: read
  packages: write
  security-events: write

jobs:
  docker:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'build')) }}
    uses: ./.github/workflows/docker_service_pipeline.yml
    with:
      service_name: availability-service
      service_path: .
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
